name: Publish To Repository

# TODO this attempts to run only after successful CI build job - needs to change when out of SNAPSHOT phase
on:
  workflow_run:
    workflows: ["Java CI with Gradle"]
    branches: ["main"]
    types:
      - completed
  workflow_dispatch: # can also run manually....

jobs:
  publish:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
      # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Publish with Gradle Wrapper
        run: ./gradlew publish
        env:
          UKSRC_REPO_USERNAME: ${{ secrets.UKSRC_REPO_USERNAME }}
          UKSRC_REPO_PASSWORD: ${{ secrets.UKSRC_REPO_PASSWORD }}

  
